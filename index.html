<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pro Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:24px;
  background:#0f172a;
  color:#00ff99;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:#111a2e;
  margin:10px;
  padding:20px;
  width:200px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,153,0.1);
}

.price{
  font-size:22px;
  margin-top:10px;
  color:#00ff99;
}

.change.up{color:#00ff99;}
.change.down{color:#ff4d4d;}

#chart{
  height:400px;
  margin:30px;
}
</style>
</head>

<body>

<header>🚀 Crypto Pro Live Dashboard</header>

<div class="container">

  <div class="card">
    <h3>Bitcoin</h3>
    <div class="price" id="btc">Loading...</div>
    <div class="change" id="btcChange"></div>
  </div>

  <div class="card">
    <h3>Ethereum</h3>
    <div class="price" id="eth">Loading...</div>
    <div class="change" id="ethChange"></div>
  </div>

  <div class="card">
    <h3>Solana</h3>
    <div class="price" id="sol">Loading...</div>
    <div class="change" id="solChange"></div>
  </div>

</div>

<div id="chart"></div>

<script>
// ===================== PRICE API =====================
async function load(){
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true");
  const d = await res.json();

  function set(id, price, change){
    document.getElementById(id).innerText = "$" + price.toFixed(2);

    let c = document.getElementById(id+"Change");
    c.innerText = change.toFixed(2) + "% (24h)";

    c.className = change >= 0 ? "change up" : "change down";
  }

  set("btc", d.bitcoin.usd, d.bitcoin.usd_24h_change);
  set("eth", d.ethereum.usd, d.ethereum.usd_24h_change);
  set("sol", d.solana.usd, d.solana.usd_24h_change);
}

load();
setInterval(load, 5000);

// ===================== CANDLE CHART =====================
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: {
        background: { color: '#0b0f19' },
        textColor: '#fff',
    },
    grid: {
        vertLines: { color: '#1f2937' },
        horzLines: { color: '#1f2937' },
    },
});

const candleSeries = chart.addCandlestickSeries();

let data = [
    { time: '2024-01-01', open: 42000, high: 43000, low: 41000, close: 42500 },
    { time: '2024-01-02', open: 42500, high: 44000, low: 42000, close: 43800 },
    { time: '2024-01-03', open: 43800, high: 45000, low: 43000, close: 43500 },
    { time: '2024-01-04', open: 43500, high: 46000, low: 43000, close: 45500 },
];

candleSeries.setData(data);

// fake live update
setInterval(() => {
    let last = data[data.length - 1];
    let newClose = last.close + (Math.random() * 800 - 400);

    let newCandle = {
        time: last.time,
        open: last.open,
        high: Math.max(last.high, newClose),
        low: Math.min(last.low, newClose),
        close: newClose
    };

    candleSeries.update(newCandle);
}, 3000);

</script>

</body>
</html>
