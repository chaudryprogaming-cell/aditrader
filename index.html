<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pro Live</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:24px;
  background:#0f172a;
  color:#00ff99;
  font-weight:bold;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  background:#111a2e;
  margin:10px;
  padding:20px;
  width:200px;
  border-radius:12px;
  text-align:center;
}

.price{
  font-size:22px;
  margin-top:10px;
  color:#00ff99;
}

.change.up{color:#00ff99;}
.change.down{color:#ff4d4d;}

#chart{
  height:420px;
  margin:30px;
}
</style>
</head>

<body>

<header>🚀 Crypto Live Binance-Style Dashboard</header>

<div class="container">

  <div class="card">
    <h3>Bitcoin</h3>
    <div class="price" id="btc">Loading...</div>
  </div>

  <div class="card">
    <h3>Ethereum</h3>
    <div class="price" id="eth">Loading...</div>
  </div>

</div>

<div id="chart"></div>

<script>

// ================= LIVE PRICE =================
let btcPrice = 43000;

// update price every 3 sec
setInterval(async () => {
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  const d = await res.json();

  btcPrice = d.bitcoin.usd;

  document.getElementById("btc").innerText = "$" + d.bitcoin.usd;
  document.getElementById("eth").innerText = "$" + d.ethereum.usd;
}, 3000);


// ================= BINANCE STYLE CHART =================
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: {
    background: { color: '#0b0f19' },
    textColor: '#fff',
  },
  grid: {
    vertLines: { color: '#1f2937' },
    horzLines: { color: '#1f2937' },
  },
  timeScale: {
    timeVisible: true,
    secondsVisible: true
  }
});

// NEW API STYLE (correct)
const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries);

// start with current time
let time = Math.floor(Date.now() / 1000);

// initial candle
let last = {
  time: time,
  open: btcPrice,
  high: btcPrice,
  low: btcPrice,
  close: btcPrice
};

let candles = [last];

candleSeries.setData(candles);

// ================= LIVE CANDLE ENGINE =================
setInterval(() => {

  let change = (Math.random() - 0.5) * 200;
  let newPrice = btcPrice + change;

  let newCandle = {
    time: Math.floor(Date.now() / 1000),
    open: last.close,
    high: Math.max(last.close, newPrice),
    low: Math.min(last.close, newPrice),
    close: newPrice
  };

  candles.push(newCandle);

  if(candles.length > 40){
    candles.shift();
  }

  candleSeries.setData(candles);

  last = newCandle;

}, 2000);

</script>

</body>
</html>
