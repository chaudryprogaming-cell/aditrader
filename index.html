<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Pro Binance Level</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:24px;
  background:#0f172a;
  color:#00ff99;
  font-weight:bold;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:#111a2e;
  margin:10px;
  padding:20px;
  width:200px;
  border-radius:12px;
  text-align:center;
}

.price{
  font-size:22px;
  color:#00ff99;
}

#chart{
  height:450px;
  margin:30px;
}
</style>
</head>

<body>

<header>🚀 Binance-Level Live Crypto Chart</header>

<div class="container">
  <div class="card">
    <h3>Bitcoin</h3>
    <div class="price" id="btc">Loading...</div>
  </div>
</div>

<div id="chart"></div>

<script>

// ================= PRICE FEED =================
let btcPrice = 43000;

setInterval(async () => {
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
  const d = await res.json();
  btcPrice = d.bitcoin.usd;
  document.getElementById("btc").innerText = "$" + btcPrice;
}, 3000);

// ================= CHART =================
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: {
    background: { color: '#0b0f19' },
    textColor: '#fff',
  },
  grid: {
    vertLines: { color: '#1f2937' },
    horzLines: { color: '#1f2937' },
  },
  timeScale: {
    timeVisible: true,
    secondsVisible: true
  }
});

const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries);

// ================= REAL BINANCE LOGIC =================

// current candle bucket (1 minute)
let currentMinute = Math.floor(Date.now() / 60000);

let candle = {
  time: currentMinute * 60,
  open: btcPrice,
  high: btcPrice,
  low: btcPrice,
  close: btcPrice
};

let candles = [];
candles.push(candle);

candleSeries.setData(candles);

// ================= LIVE ENGINE =================
setInterval(() => {

  let nowMinute = Math.floor(Date.now() / 60000);

  // 🔥 SAME MINUTE → update candle
  if(nowMinute === currentMinute){

    let change = (Math.random() - 0.5) * 200;
    let newPrice = btcPrice + change;

    candle.close = newPrice;
    candle.high = Math.max(candle.high, newPrice);
    candle.low = Math.min(candle.low, newPrice);

    candles[candles.length - 1] = candle;

    candleSeries.setData(candles);

  }

  // 🔥 NEW MINUTE → new candle
  else{

    currentMinute = nowMinute;

    let newCandle = {
      time: currentMinute * 60,
      open: candle.close,
      high: candle.close,
      low: candle.close,
      close: candle.close
    };

    candle = newCandle;
    candles.push(newCandle);

    if(candles.length > 60){
      candles.shift();
    }

    candleSeries.setData(candles);
  }

}, 1000);

</script>

</body>
</html>
